services:
  - type: web
    name: spam-fl-server
    env: python
    plan: free
    rootDir: fl_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: fl-model-storage
      mountPath: /opt/render/project/src/fl_server/models
      sizeGB: 1
